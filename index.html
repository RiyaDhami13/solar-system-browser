<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar System Browser</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#020510; overflow:hidden; font-family:monospace; }
    canvas { display:block;}

    #hud {
      position:fixed; top:0; left:0; right:0;
      padding: 1.2rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      pointer-events:none; z-index:10; }

    #title {
      font-family: monospace;
      font-size: 1rem; color: #5FC842;
      letter-spacing: 0.2em; text-transform: uppercase;
    }

    #title span { 
      display:block;
      font-size:0.6rem;
      color:rgba(200,223,245,0.4); 
      margin-top:0.2rem;
      letter-spacing:0.25em; 
    }
    
    #info {
      font-family: monospace;
      font-size: 0.7rem; color: rgba(200,223,245,0.4);
      letter-spacing: 0.1em; text-align: right;
    }

    #instructions {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translate(-50%);
      font-family: monospace;
      font-size: 0.6rem; color: rgba(200,223,245,0.25);
      letter-spacing: 0.1em; text-align: center;
      pointer-events: none; z-index: 10;
    }

  </style>
</head>
<body>

  

  <div id="hud">
    <div id="title">
      ☀ Solar System Browser
      <span>3D Edition</span>
    </div>
    <div id="info">
      Drag to orbit · Scroll to zoom
      </div>
    </div>

    <div id="instructions">
      FIRST 3D SCENE 
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

  <script>

    //1. SCENE - 3D container
    const scene = new THREE.Scene();

    //2. Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );

    camera.position.set(0,20,60);

 // 3. RENDERER — the drawing engine
    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    document.body.appendChild(renderer.domElement);

    const sunLight = new THREE.PointLight(0xFFFFDD, 2, 500);
    sunLight.position.set(0,0,0);
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x111133, 1);
    scene.add(ambientLight);

//THe sun
const sunGeo = new THREE.SphereGeometry(5,32,32);
const sunMat = new THREE.MeshBasicMaterial({color:'#FDB813'});

const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

//Earth
const earthGeo = new THREE.SphereGeometry(1.2,32,32);
const earthMat = new THREE.MeshStandardMaterial({
  color: '#4B9CD3',
  roughness:0.8,
  metalness:0.1
});

const earth = new THREE.Mesh(earthGeo, earthMat);
earth.position.set(20,0,0);
scene.add(earth);

//Mars
const marsGeo = new THREE.SphereGeometry(0.8,32,32);
const marsMat = new THREE.MeshStandardMaterial({
  color:'#C1440E',
  roughness:0.9,
  metalness:0.0
});

const mars = new THREE.Mesh(marsGeo, marsMat);
mars.position.set(32,0,0);
scene.add(mars);

//starfield
const starGeometry = new THREE.BufferGeometry();
const starCount = 300;
const starPositions = new Float32Array(starCount * 3);

for (let i= 0; i <= starCount * 3; i++) {
  starPositions[i] = (Math.random() - 0.5) * 1000;
}

starGeometry.setAttribute(
'position',
new THREE.BufferAttribute(starPositions, 3)
);


const starMaterial = new THREE.PointsMaterial({ color: 0xffffff,
      size: 0.3,
      sizeAttenuation: true
});

const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

 // ORBIT CONTROLS — manual implementation

  let isDragging = false;
  let prevMouseX = 0;
  let prevMouseY = 0;
  let cameraTheta = Math.PI / 8;
  let cameraPhi = Math.PI / 3;
  let cameraRadius = 60;

  function updateCamera () {
    camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
    camera.position.y = cameraRadius * Math.cos(cameraPhi);
    camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
    camera.lookAt(0,0,0);
  }
  updateCamera();

  renderer.domElement.addEventListener('mousedown', e=> {
    isDragging = true;
    prevMouseX = e.clientX;
    prevMouseY = e.clientY;
  });

  window.addEventListener('mouseup', () => {isDragging= falsel;});

  window.addEventListener('mousemove', e => {
    if(!isDragging) return;
    const dx = e.clientX - prevMouseX ;
    const dy = e.clientY - prevMouseY ;
    cameraTheta -= dx * 0.005;
    cameraPhi = Math.max(Math.min(Math.PI / 2, cameraPhi + dy * 0.005));
    prevMouseX = e.clientX;
    prevMouseY = e.clientY;
    updateCamera();
  })

renderer.domElement.addEventListener('wheel', e=> {
  cameraRadius = Math.max(10, Math.min(200,cameraRadius + e.deltaY * 0.1));
  updateCamera();
}, {passive :true});

//planet orbits
let earthAngle = 0;
let marsAngle = 1.2;

function animate() {
  requestAnimationFrame(animate);

  sun.rotation.y += 0.002;

  earthAngle += 0.010;
  earth.position.x = Math.cos(earthAngle) * 20;
  earth.postition.y = Math.sin(earthAngle) * 20;
  mars.rotation.y += 0.015;

  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

  </script>
</body>
</html>
