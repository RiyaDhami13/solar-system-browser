<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar System Browser</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#020510; overflow:hidden; font-family:monospace; color:white; }
    canvas { display:block; position:fixed; top:0; left:0; }
    #hud { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; }
    #title { position:absolute; top:1.5rem; left:1.5rem; font-size:1rem; color:#F5C842; letter-spacing:0.2em; text-transform:uppercase; }
    #title span { display:block; font-size:0.6rem; color:rgba(200,223,245,0.4); margin-top:0.2rem; letter-spacing:0.25em; }
    #controls { position:absolute; top:1.5rem; right:1.5rem; display:flex; align-items:center; gap:0.8rem; pointer-events:auto; }
    .ctrl-btn { padding:0.35rem 0.9rem; background:rgba(0,229,255,0.07); border:1px solid rgba(0,229,255,0.25); color:rgba(200,223,245,0.7); border-radius:3px; cursor:pointer; font-family:monospace; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
    .ctrl-btn:hover { background:rgba(245,200,66,0.1); border-color:rgba(245,200,66,0.4); color:#F5C842; }
    #speed-label { font-size:0.65rem; color:rgba(200,223,245,0.4); letter-spacing:0.1em; }
    #speed-slider { width:80px; accent-color:#F5C842; cursor:pointer; }
    #tooltip { position:absolute; top:1.5rem; left:50%; transform:translateX(-50%); font-size:0.75rem; color:#F5C842; letter-spacing:0.2em; text-transform:uppercase; opacity:0; transition:opacity 0.2s; }
    #info-panel { position:absolute; bottom:2rem; left:1.5rem; width:220px; background:rgba(2,5,16,0.85); border:1px solid rgba(0,229,255,0.15); border-radius:6px; padding:1rem; opacity:0; transform:translateY(8px); transition:all 0.3s; pointer-events:none; }
    #info-panel.visible { opacity:1; transform:translateY(0); }
    #info-panel .p-name { font-size:1rem; color:#F5C842; letter-spacing:0.1em; margin-bottom:0.6rem; padding-bottom:0.6rem; border-bottom:1px solid rgba(255,255,255,0.08); }
    #info-panel .p-row { font-size:0.7rem; color:rgba(200,223,245,0.6); margin:0.3rem 0; display:flex; justify-content:space-between; }
    #info-panel .p-row span { color:rgba(200,223,245,0.9); }
    #instructions { position:absolute; bottom:1.5rem; left:50%; transform:translateX(-50%); font-size:0.6rem; color:rgba(200,223,245,0.25); letter-spacing:0.1em; text-align:center; white-space:nowrap; }
  </style>
</head>
<body>

  <canvas id="solarCanvas"></canvas>

  <div id="hud">
    <div id="title">
      ☀ Solar System Browser
      <span>Interactive 2D Edition</span>
    </div>
    <div id="controls">
      <span id="speed-label">SPEED</span>
      <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1"/>
      <button class="ctrl-btn" id="pause-btn">⏸ Pause</button>
      <button class="ctrl-btn" id="reset-btn">⟳ Reset</button>
    </div>
    <div id="tooltip"></div>
    <div id="info-panel">
      <div class="p-name" id="p-name">—</div>
      <div class="p-row">Orbit period <span id="p-period">—</span></div>
      <div class="p-row">Temperature  <span id="p-temp">—</span></div>
      <div class="p-row">Moons        <span id="p-moons">—</span></div>
      <div class="p-row">Type         <span id="p-type">—</span></div>
    </div>
    <div id="instructions">HOVER to identify · CLICK to inspect · SCROLL to zoom · 1–8 to select</div>
  </div>

  <script>

    // ── Setup ────────────────────────────────
    const canvas      = document.getElementById('solarCanvas');
    const ctx         = canvas.getContext('2d');
    const tooltip     = document.getElementById('tooltip');
    const infoPanel   = document.getElementById('info-panel');
    const pauseBtn    = document.getElementById('pause-btn');
    const resetBtn    = document.getElementById('reset-btn');
    const speedSlider = document.getElementById('speed-slider');
    const pName       = document.getElementById('p-name');
    const pPeriod     = document.getElementById('p-period');
    const pTemp       = document.getElementById('p-temp');
    const pMoons      = document.getElementById('p-moons');
    const pType       = document.getElementById('p-type');

    // ── Canvas Sizing ────────────────────────
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function getCenter() {
      return { x: canvas.width / 2, y: canvas.height / 2 };
    }

    // ── Planet Data ──────────────────────────
    const planets = [
      { id:'mercury', name:'Mercury', orbitRadius:80,  radius:4,  color:'#B5B5B5', speed:0.0400, angle:0.0, period:'88 days',   temp:'-180 to 430°C', moons:0,   type:'Rocky'    },
      { id:'venus',   name:'Venus',   orbitRadius:120, radius:8,  color:'#E8C06B', speed:0.0160, angle:1.2, period:'225 days',  temp:'465°C avg',     moons:0,   type:'Rocky'    },
      { id:'earth',   name:'Earth',   orbitRadius:165, radius:9,  color:'#4B9CD3', speed:0.0100, angle:2.5, period:'365 days',  temp:'15°C avg',      moons:1,   type:'Rocky'    },
      { id:'mars',    name:'Mars',    orbitRadius:215, radius:6,  color:'#C1440E', speed:0.0050, angle:0.8, period:'687 days',  temp:'-63°C avg',     moons:2,   type:'Rocky'    },
      { id:'jupiter', name:'Jupiter', orbitRadius:285, radius:22, color:'#C88B3A', speed:0.0020, angle:3.1, period:'12 years',  temp:'-110°C',        moons:95,  type:'Gas Giant' },
      { id:'saturn',  name:'Saturn',  orbitRadius:350, radius:18, color:'#E4D191', speed:0.0010, angle:4.5, period:'29 years',  temp:'-140°C',        moons:146, type:'Gas Giant' },
      { id:'uranus',  name:'Uranus',  orbitRadius:405, radius:13, color:'#7DE8E8', speed:0.0005, angle:1.8, period:'84 years',  temp:'-197°C',        moons:28,  type:'Ice Giant' },
      { id:'neptune', name:'Neptune', orbitRadius:450, radius:12, color:'#4B70DD', speed:0.0002, angle:5.2, period:'165 years', temp:'-201°C',        moons:16,  type:'Ice Giant' },
    ];

    // ── State ────────────────────────────────
    let hoveredPlanet  = null;
    let selectedPlanet = null;
    let isPaused       = false;
    let speedMult      = 1;
    let zoomLevel      = 1;
    let mouseX         = 0;
    let mouseY         = 0;

    // ── Distance Helper ──────────────────────
    function getDistance(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      return Math.sqrt(dx * dx + dy * dy);
    }

    // ── Draw Stars ───────────────────────────
    function drawStars() {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for (let i = 0; i < 200; i++) {
        const x    = (Math.sin(i * 127.1) * 0.5 + 0.5) * canvas.width;
        const y    = (Math.sin(i * 311.7) * 0.5 + 0.5) * canvas.height;
        const size = (Math.sin(i * 74.7)  * 0.5 + 0.5) * 1.5;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ── Draw Sun ─────────────────────────────
    function drawSun(cx, cy) {
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
      glow.addColorStop(0,   'rgba(253,184,19,0.4)');
      glow.addColorStop(0.5, 'rgba(253,184,19,0.1)');
      glow.addColorStop(1,   'rgba(253,184,19,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, 80, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, 35, 0, Math.PI * 2);
      ctx.fillStyle = '#FDB813';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx - 8, cy - 8, 12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,240,150,0.4)';
      ctx.fill();
    }

    // ── Draw Orbit Ring ──────────────────────
    function drawOrbitRing(cx, cy, planet) {
      ctx.beginPath();
      ctx.arc(cx, cy, planet.orbitRadius * zoomLevel, 0, Math.PI * 2);
      if (selectedPlanet?.id === planet.id) {
        ctx.strokeStyle = 'rgba(245,200,66,0.35)';
        ctx.lineWidth = 1.5;
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth = 1;
      }
      ctx.stroke();
    }

    // ── Draw Planet ──────────────────────────
    function drawPlanet(cx, cy, planet) {
      const scaledOrbit  = planet.orbitRadius * zoomLevel;
      const scaledRadius = Math.max(planet.radius * zoomLevel, 2);

      const x = cx + Math.cos(planet.angle) * scaledOrbit;
      const y = cy + Math.sin(planet.angle) * scaledOrbit;

      planet.screenX = x;
      planet.screenY = y;

      const dist      = getDistance(mouseX, mouseY, x, y);
      const isHovered = dist < scaledRadius + 8;

      if (isHovered || selectedPlanet?.id === planet.id) {
        const glow = ctx.createRadialGradient(x, y, 0, x, y, scaledRadius * 3);
        glow.addColorStop(0, planet.color + '55');
        glow.addColorStop(1, planet.color + '00');
        ctx.beginPath();
        ctx.arc(x, y, scaledRadius * 3, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(x, y, scaledRadius, 0, Math.PI * 2);
      ctx.fillStyle = planet.color;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(
        x - scaledRadius * 0.3,
        y - scaledRadius * 0.3,
        scaledRadius * 0.25,
        0, Math.PI * 2
      );
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();

      if (planet.id === 'saturn') {
        ctx.beginPath();
        ctx.ellipse(x, y, scaledRadius * 2.2, scaledRadius * 0.5, 0.4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(228,209,145,0.55)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (isHovered) hoveredPlanet = planet;
      return isHovered;
    }

    // ── Show Planet Info ─────────────────────
    function showPlanetInfo(planet) {
      pName.textContent   = planet.name;
      pPeriod.textContent = planet.period;
      pTemp.textContent   = planet.temp;
      pMoons.textContent  = planet.moons;
      pType.textContent   = planet.type;
      infoPanel.classList.add('visible');
    }

    // ── Update Planets ───────────────────────
    function updatePlanets() {
      if (isPaused) return;
      planets.forEach(p => { p.angle += p.speed * speedMult; });
    }

    // ── Render Loop ──────────────────────────
    function animate() {
      const center = getCenter();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hoveredPlanet = null;

      drawStars();
      planets.forEach(p => drawOrbitRing(center.x, center.y, p));
      drawSun(center.x, center.y);
      planets.forEach(p => drawPlanet(center.x, center.y, p));

      if (hoveredPlanet) {
        tooltip.textContent   = hoveredPlanet.name;
        tooltip.style.opacity = '1';
        canvas.style.cursor   = 'pointer';
      } else {
        tooltip.style.opacity = '0';
        canvas.style.cursor   = 'default';
      }

      updatePlanets();
      requestAnimationFrame(animate);
    }

    // ── Events ───────────────────────────────
    canvas.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('click', () => {
      if (hoveredPlanet) {
        selectedPlanet = hoveredPlanet;
        showPlanetInfo(hoveredPlanet);
      }
    });

    canvas.addEventListener('wheel', e => {
      zoomLevel = Math.max(0.4, Math.min(2.5, zoomLevel + e.deltaY * -0.001));
    }, { passive: true });

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
    });

    resetBtn.addEventListener('click', () => {
      planets.forEach((p, i) => { p.angle = i * 0.8; });
      zoomLevel      = 1;
      selectedPlanet = null;
      infoPanel.classList.remove('visible');
    });

    speedSlider.addEventListener('input', e => {
      speedMult = parseFloat(e.target.value);
    });

    document.addEventListener('keydown', e => {
      const index = parseInt(e.key) - 1;
      if (index >= 0 && index < planets.length) {
        selectedPlanet = planets[index];
        showPlanetInfo(planets[index]);
      }
    });

    // ── Start ────────────────────────────────
    animate();

  </script>
</body>
</html>
