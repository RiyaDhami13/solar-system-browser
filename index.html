<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Solar System Browser</title>
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #020510;
      overflow: hidden;
      font-family: monospace;
      color:white;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #tooltip {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      color: #F5C842;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #instructions {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(200, 223, 245, 0.3);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-align: center;
    }

  </style>
</head>

<body>

  <canvas id="solarCanvas"></canvas>
  <div id="tooltip"></div>
  <div id="instructions">HOVER over a planet · CLICK to select · PRESS 1–8 to jump</div>

  <script>

    
    // SETUP
    

    const canvas  = document.getElementById('solarCanvas');
    const ctx     = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    // Match canvas resolution to screen size
    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Center point of the solar system
    function getCenter() {
      return {
        x: canvas.width  / 2,
        y: canvas.height / 2
      };
    }


    // PLANET DATA — one clean array


    const planets = [
      { id:'mercury', name:'Mercury', orbitRadius:80,  radius:4,  color:'#B5B5B5', speed:0.0400, angle:0.0 },
      { id:'venus',   name:'Venus',   orbitRadius:120, radius:8,  color:'#E8C06B', speed:0.0160, angle:1.2 },
      { id:'earth',   name:'Earth',   orbitRadius:165, radius:9,  color:'#4B9CD3', speed:0.0100, angle:2.5 },
      { id:'mars',    name:'Mars',    orbitRadius:215, radius:6,  color:'#C1440E', speed:0.0050, angle:0.8 },
      { id:'jupiter', name:'Jupiter', orbitRadius:285, radius:22, color:'#C88B3A', speed:0.0020, angle:3.1 },
      { id:'saturn',  name:'Saturn',  orbitRadius:350, radius:18, color:'#E4D191', speed:0.0010, angle:4.5 },
      { id:'uranus',  name:'Uranus',  orbitRadius:405, radius:13, color:'#7DE8E8', speed:0.0005, angle:1.8 },
      { id:'neptune', name:'Neptune', orbitRadius:450, radius:12, color:'#4B70DD', speed:0.0002, angle:5.2 },
    ];

    
    // STATE — what is hovered or selected
  

    let hoveredPlanet  = null;
    let selectedPlanet = null;
    let mouseX = 0;
    let mouseY = 0;


    // MOUSE EVENTS


    canvas.addEventListener('mousemove', event => {
      mouseX = event.clientX;
      mouseY = event.clientY;
    });

    canvas.addEventListener('click', () => {
      if (hoveredPlanet) {
        selectedPlanet = hoveredPlanet;
      }
    });

    
    // DISTANCE HELPER
    // Pythagorean theorem — straight line between 2 points
  

    function getDistance(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      return Math.sqrt(dx * dx + dy * dy);
    }

    
    // DRAW FUNCTIONS
    

    function drawStars() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      for (let i = 0; i < 200; i++) {
        // Stable positions — same every frame
        const x    = (Math.sin(i * 127.1) * 0.5 + 0.5) * canvas.width;
        const y    = (Math.sin(i * 311.7) * 0.5 + 0.5) * canvas.height;
        const size = (Math.sin(i * 74.7)  * 0.5 + 0.5) * 1.5;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSun(cx, cy) {
      // Outer glow
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
      glow.addColorStop(0,   'rgba(253, 184, 19, 0.4)');
      glow.addColorStop(0.4, 'rgba(253, 184, 19, 0.15)');
      glow.addColorStop(1,   'rgba(253, 184, 19, 0)');
      ctx.beginPath();
      ctx.arc(cx, cy, 80, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Sun body
      ctx.beginPath();
      ctx.arc(cx, cy, 35, 0, Math.PI * 2);
      ctx.fillStyle = '#FDB813';
      ctx.fill();

      // Bright highlight
      ctx.beginPath();
      ctx.arc(cx - 8, cy - 8, 12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 240, 150, 0.4)';
      ctx.fill();
    }

    function drawOrbitRing(cx, cy, planet) {
      ctx.beginPath();
      ctx.arc(cx, cy, planet.orbitRadius, 0, Math.PI * 2);

      // Glow brighter if this planet is selected
      if (selectedPlanet && selectedPlanet.id === planet.id) {
        ctx.strokeStyle = 'rgba(245, 200, 66, 0.3)';
        ctx.lineWidth = 1.5;
      } else {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.07)';
        ctx.lineWidth = 1;
      }
      ctx.stroke();
    }

    function drawPlanet(cx, cy, planet) {
      // Position from angle — the cos/sin you know from Day 1
      const x = cx + Math.cos(planet.angle) * planet.orbitRadius;
      const y = cy + Math.sin(planet.angle) * planet.orbitRadius;

      // Store screen position for hover detection
      planet.screenX = x;
      planet.screenY = y;

      // Is mouse over this planet?
      const dist      = getDistance(mouseX, mouseY, x, y);
      const isHovered = dist < planet.radius + 6;

      // Glow when hovered or selected
      if (isHovered || selectedPlanet?.id === planet.id) {
        const glow = ctx.createRadialGradient(x, y, 0, x, y, planet.radius * 3);
        glow.addColorStop(0, planet.color + '66');
        glow.addColorStop(1, planet.color + '00');
        ctx.beginPath();
        ctx.arc(x, y, planet.radius * 3, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
      }

      // Planet body
      ctx.beginPath();
      ctx.arc(x, y, planet.radius, 0, Math.PI * 2);
      ctx.fillStyle = planet.color;
      ctx.fill();

      // Highlight dot — makes it look spherical
      ctx.beginPath();
      ctx.arc(
        x - planet.radius * 0.3,
        y - planet.radius * 0.3,
        planet.radius * 0.25,
        0, Math.PI * 2
      );
      ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.fill();

      // Saturn rings — special case
      if (planet.id === 'saturn') {
        ctx.beginPath();
        ctx.ellipse(x, y, planet.radius * 2.2, planet.radius * 0.5, 0.4, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(228, 209, 145, 0.5)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      }

      // Update hover state
      if (isHovered) hoveredPlanet = planet;

      return isHovered;
    }



    function updatePlanets() {
      planets.forEach(planet => {
        planet.angle += planet.speed;
      });
    }

    
    // RENDER LOOP — the heartbeat


    function animate() {
      const center = getCenter();

      // Clear last frame
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Reset hover before checking this frame
      hoveredPlanet = null;

      // Draw layers — order matters
      drawStars();
      planets.forEach(planet => drawOrbitRing(center.x, center.y, planet));
      drawSun(center.x, center.y);
      planets.forEach(planet => drawPlanet(center.x, center.y, planet));

      // Update tooltip
      if (hoveredPlanet) {
        tooltip.textContent  = hoveredPlanet.name;
        tooltip.style.opacity = '1';
        canvas.style.cursor  = 'pointer';
      } else {
        tooltip.style.opacity = '0';
        canvas.style.cursor  = 'default';
      }

      // Advance planet positions
      updatePlanets();

      // Next frame
      requestAnimationFrame(animate);
    }

    // Keyboard — 1-8 selects planets
    document.addEventListener('keydown', event => {
      const index = parseInt(event.key) - 1;
      if (index >= 0 && index < planets.length) {
        selectedPlanet = planets[index];
      }
    });

    // Start
    animate();
    

  </script>

</body>
</html>
