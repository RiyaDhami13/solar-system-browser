<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar System Browser</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#020510; overflow:hidden; font-family:monospace; color:white; }
    canvas { display:block; position:fixed; top:0; left:0; }
    #hud { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:10; }
    #title { position:absolute; top:1.5rem; left:1.5rem; font-size:1rem; color:#F5C842; letter-spacing:0.2em; text-transform:uppercase; }
    #title span { display:block; font-size:0.6rem; color:rgba(200,223,245,0.4); margin-top:0.2rem; letter-spacing:0.25em; }
    #controls { position:absolute; top:1.5rem; right:1.5rem; display:flex; align-items:center; gap:0.8rem; pointer-events:auto; }
    .ctrl-btn { padding:0.35rem 0.9rem; background:rgba(0,229,255,0.07); border:1px solid rgba(0,229,255,0.25); color:rgba(200,223,245,0.7); border-radius:3px; cursor:pointer; font-family:monospace; font-size:0.7rem; letter-spacing:0.1em; transition:all 0.2s; }
    .ctrl-btn:hover { background:rgba(245,200,66,0.1); border-color:rgba(245,200,66,0.4); color:#F5C842; }
    #speed-label { font-size:0.65rem; color:rgba(200,223,245,0.4); letter-spacing:0.1em; }
    #speed-slider { width:80px; accent-color:#F5C842; cursor:pointer; }
    #tooltip { position:absolute; top:1.5rem; left:50%; transform:translateX(-50%); font-size:0.75rem; color:#F5C842; letter-spacing:0.2em; text-transform:uppercase; opacity:0; transition:opacity 0.2s; }
    #info-panel { position:absolute; bottom:2rem; left:1.5rem; width:220px; background:rgba(2,5,16,0.85); border:1px solid rgba(0,229,255,0.15); border-radius:6px; padding:1rem; opacity:0; transform:translateY(8px); transition:all 0.3s; pointer-events:none; }
    #info-panel.visible { opacity:1; transform:translateY(0); }
    #info-panel .p-name { font-size:1rem; color:#F5C842; letter-spacing:0.1em; margin-bottom:0.6rem; padding-bottom:0.6rem; border-bottom:1px solid rgba(255,255,255,0.08); }
    #info-panel .p-row { font-size:0.7rem; color:rgba(200,223,245,0.6); margin:0.3rem 0; display:flex; justify-content:space-between; }
    #info-panel .p-row span { color:rgba(200,223,245,0.9); }
    #instructions { position:absolute; bottom:1.5rem; left:50%; transform:translateX(-50%); font-size:0.6rem; color:rgba(200,223,245,0.25); letter-spacing:0.1em; text-align:center; white-space:nowrap; }
  </style>
</head>
<body>

  <canvas id="solarCanvas"></canvas>

  <div id="hud">

    <div id="title">
      ☀ Solar System Browser
      <span>Interactive 2D Edition</span>
    </div>

    <div id="controls">
      <span id="speed-label">SPEED</span>
      <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1"/>
      <button class="ctrl-btn" id="pause-btn">⏸ Pause</button>
      <button class="ctrl-btn" id="reset-btn">⟳ Reset</button>
    </div>

    <div id="tooltip"></div>

    <div id="info-panel">
      <div class="p-name" id="p-name">—</div>
      <div class="p-row">Orbit period <span id="p-period">—</span></div>
      <div class="p-row">Temperature  <span id="p-temp">—</span></div>
      <div class="p-row">Moons        <span id="p-moons">—</span></div>
      <div class="p-row">Type         <span id="p-type">—</span></div>
    </div>

    <div id="instructions">
      HOVER to identify · CLICK to inspect · SCROLL to zoom · 1–8 to select
    </div>

  </div>

  <script src="solar.js"></script>

</body>
</html>
